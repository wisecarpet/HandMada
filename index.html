<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" content="width=device-width">
  <title>HandMada: Cakes&Candles💝</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Marck+Script&display=swap" rel="stylesheet">
  <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

  <script>
    emailjs.init({
      publicKey: "-Fwo2ABhWt12yth60"
    });
  </script>
  <script src="script.js" defer></script>
</head>
<body>

  <div class="lang-switcher">
    <button onclick="changeLanguage('ru')">RU</button>
    <button onclick="changeLanguage('en')">EN</button>
    <button onclick="changeLanguage('fi')">FI</button>
    <button onclick="changeLanguage('ua')">UA</button>

</div>
<input type="hidden" name="selected_language" id="selected_language" value="ru">

  <div class="hero">
    <div class="logotype">
       <img class="logo_image" src="icons/logo3.JPG">
          <div class="logo-texts">
            <h1 id="logo-title"></h1>
            <p id="logo-text"></p>
          </div>
    </div>
    
    <button id="openCakeDialog"></button>
    <button id="openCandleDialog"></button>

      <dialog id="cakeDialog">
        <button onclick="doCakeOrder()" id="cake-Order"></button>
        <button onclick="moreForCakes()" id="cake-Information"></button>
        <button class="closeDialog">✗</button>
      </dialog>
      <dialog id="candleDialog">
        <button onclick="doCandleOrder()" id="candle-Order"></button>
        <button onclick="moreForCandles()" id="candle-Information"></button>
        <button class="closeDialog">✗</button>
      </dialog>
  </div>
 
  <div class="candles">
    <section id="candlesInfo">
      <div id="aboutCandles" class="about">
        <h2 id="candles-title"></h2>
        <h3 id="candles-description"></h3>
        <h3 id="candles-subtitle1"></h3>
          <div class="card">
              <div id="candles-texts"></div>
              <h4 id="candles-subtitle2"></h4>
              <h5 id="candles-list-title"></h5>
              <ul id="candles-list"></ul>
              <p id="candles-resume"></p>
          </div>
      </div>
    </section>
      <div id="candlesContainer" class="candles-slides"></div>
  </div>
  <div class="order">
    <button onclick="orderCandles()" class="order-btn" id="order-btn"></button>

    <form id="candleOrderForm" style="display: none;">
      <label for="candle_name" id="label-name"></label>
      <input type="hidden" name="theme" id="theme">
      <input type="hidden" name="hi" id="hi">
      <input type="text" id="candle_name" name="user_name" required>

      <input type="hidden" name="thanks_text" id="thanks_text">
      <input type="hidden" name="thanks_message_candles" id="thanks_message_candles">
      <label for="candle_email" id="label-email"></label>
      <input type="email" id="candle_email" name="email" required>

      <label for="order-items" id="label-order-items"></label>
      <select name="order-items" id="order-items">
        <option value=""></option>
      </select>

        <h3 id="order"></h3>
        <div id="cartPreview" style="margin-bottom: 15px;"></div>
        <input type="hidden" name="order_title" id="order_title">
        <!-- скрытое поле, куда положим итоговый заказ -->
        <input type="hidden" name="order_summary" id="order_summary">
        <input type="hidden" name="regards" id="regards">
        <input type="hidden" name="HandMada" id="HandMada">
        <input type="hidden" name="best_regards" id="best_regards">
        <input type="hidden" name="email_subject" id="email_subject">
        <input type="hidden" name="order_email_body" id="order_email_body">
        <input type="hidden" name="thaks_email_body" id="thaks_email_body">

      <input type="submit" id="submit" value="">
    </form>
    <div id="candleList"></div>
  </div>
    
    <div class="cakes"></div>
      <section id="cakesInfo">
        <div id="aboutCakes" class="about">
            <h2 id="cakes-title"></h2>
            <h3 id="cakes-description"></h3>
            <h3 id="cakes-subtitle1"></h3>
              <div class="card">
                <div id="cakes-texts"></div>
                  <h4 id="cakes-subtitle2"></h4>
                  <h5 id="cakes-list-title"></h5>
                  <ul id="cakes-list"></ul>
                  <p id="cakes-resume"></p>
                </div>
              </div>
        </div>
        <div id="cakesContainer" class="cakes-slides"></div>
      </div>
    </section>


  <div class="order">
    <button onclick="orderCakes()" class="order-btn" id="order-btn2"></button>

      <form id="cakeOrderForm" action="https://formsubmit.co/tarakanij.jazz@gmail.com" method="post" style="display: none;">
        <label for="cake_name" id="cakeLabel-name"></label>
        <input type="text" id="cake_name" name="user_name" required>

        <label for="cake_email" id="cakeLabel-email"></label>
        <input type="email" id="cake_email" name="user_email" required>

        <label for="order-items" id="cakeLabel-order-item"></label>
        <input type="file" id="foto" accept="image/jpeg, image/png">

        <label for="description" id="cakeLabel-description"></label>
        <input type="text" id="description" name="user_description">

        <input type="submit" id="cakeSubmit" value="">
      </form>
  </div>

  <div id="about_us" class="about">
    <h2 id="about-title"></h2>
      <div class="card">
        <div id="about-texts"></div>
      </div>
  </div>
  <div id="footer">
    <div id="contact_information" class="contact">
      <h3 id="contact-title"></h3>

        <div id="contact" class="for_contact">
            <p id="email"></p>
            <p id="phone1"></p>
            <p id="phone2"></p>
        </div>
    </div>

    <div id="socials" class="for_contact">
      <h4 id="social_title"></h4>
        <div id="social-links"></div>
    </div>
  </div>

</body>
</html>
